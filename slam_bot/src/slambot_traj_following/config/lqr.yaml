lqr:
  ros__parameters:
    estimated_pose_topic: "/estimated_pose"
    path_topic: "/path"
    cmd_vel_topic: "/cmd_vel"
    navigation_state_topic: "/is_navigating"
    stop_service_name: "/lqr/stop"
    control_period_ms: 20
    lookahead_points: 1
    max_linear_velocity: 0.6
    max_angular_velocity: 0.6
    path_complete_tolerance: 0.08
    q_x: 50.0
    q_y: 75.0
    q_theta: 5.0
    r_weight: 0.5
